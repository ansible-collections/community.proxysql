  vars:
    test_proxysql_pgsql_servers_cleanup_after_test: false
- name: "{{ role_name }} | test_create_pgsql_server | test idempotence of create pgsql server"
  import_tasks: test_create_pgsql_server.yml
  vars:
    test_proxysql_pgsql_servers_check_idempotence: true

