### tests

- name: "{{ role_name }} | test_create_using_check_mode | test create pgsql server using check mode"
  import_tasks: test_create_using_check_mode.yml
  vars:
    test_proxysql_pgsql_servers_check_mode: true

- name: "{{ role_name }} | test_delete_using_check_mode | test delete pgsql server using check mode"
  import_tasks: test_delete_using_check_mode.yml
  vars:
    test_proxysql_pgsql_servers_check_mode: true

