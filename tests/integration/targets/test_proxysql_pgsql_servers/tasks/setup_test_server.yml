---
- name: "{{ role_name }} | {{ current_test }}  | ensure test pgsql server is created when we start"
  block:

    - name: "{{ role_name }} | {{ current_test }}  | ensure test pgsql server is created in memory"
      shell: mysql -uadmin -padmin -h127.0.0.1 -P6032 -BNe"INSERT OR REPLACE INTO pgsql_servers (hostname) VALUES ('{{ test_pgsql_host }}')"

    - name: "{{ role_name }} | {{ current_test }}  | ensure test pgsql server is created on disk"
      shell: mysql -uadmin -padmin -h127.0.0.1 -P6032 -BNe"SAVE PGSQL SERVERS TO DISK"

    - name: "{{ role_name }} | {{ current_test }}  | ensure test pgsql server is created in runtime"
      shell: mysql -uadmin -padmin -h127.0.0.1 -P6032 -BNe"LOAD PGSQL SERVERS TO RUNTIME"
