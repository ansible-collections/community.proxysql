---
- name: "{{ role_name }} | {{ current_test }} | ensure we're in a clean state when we start/finish"
  block:

    - name: "{{ role_name }} | {{ current_test }} | ensure no pgsql query rules are created"
      shell: mysql -uadmin -padmin -h127.0.0.1 -P6032 -BNe"DELETE FROM pgsql_query_rules"

    - name: "{{ role_name }} | {{ current_test }} | ensure no pgsql query rules are saved on disk"
      shell: mysql -uadmin -padmin -h127.0.0.1 -P6032 -BNe"SAVE PGSQL QUERY RULES TO DISK"

    - name: "{{ role_name }} | {{ current_test }} | ensure no pgsql query rules are loaded to runtime"
      shell: mysql -uadmin -padmin -h127.0.0.1 -P6032 -BNe"LOAD PGSQL QUERY RULES TO RUNTIME"
